<head>
  <meta charset="UTF-8">

  <link rel="icon" type="image/png" sizes="128x128" href="https://drive.google.com/thumbnail?id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i&sz=w128">
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i&sz=w180">

  <style>
    :root {
      --brand-950: #08231f;
      --brand-900: #0e2f2d;
      --brand-700: #26735b;
      --paper: #f4f7f6;
      --ink: #17211d;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      min-height: -webkit-fill-available;
      margin: 0;
      overflow: hidden;
      background: var(--paper);
      font-family: Arial, Helvetica, sans-serif;
    }

    #etos-app {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      border: 0;
      background: var(--paper);
      opacity: 0;
      transition: opacity .42s cubic-bezier(.22,1,.36,1);
      pointer-events: none;
    }

    body.app-ready #etos-app {
      opacity: 1;
      pointer-events: auto;
    }

    .launch-preview {
      position: fixed;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      background: var(--paper);
      opacity: 1;
      visibility: visible;
      transition:
        opacity .38s ease,
        visibility 0s linear 0s;
    }

    body.app-ready .launch-preview {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition:
        opacity .38s ease,
        visibility 0s linear .38s;
    }

    .preview-nav {
      height: 84px;
      padding: 0 clamp(1.25rem, 3vw, 2.6rem);
      display: flex;
      align-items: center;
      gap: 1.1rem;
      background: rgba(255,255,255,.98);
      border-top: 2px solid var(--brand-700);
      border-bottom: 1px solid #dde5e1;
    }

    .preview-logo {
      width: 74px;
      max-height: 43px;
      object-fit: contain;
    }

    .preview-brand {
      color: #14201b;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.55rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -.03em;
    }

    .preview-lines {
      margin-left: auto;
      width: 34px;
      height: 24px;
      display: grid;
      align-content: space-between;
    }

    .preview-lines span {
      display: block;
      height: 2px;
      border-radius: 99px;
      background: var(--ink);
    }

    .preview-hero {
      position: relative;
      min-height: calc(100dvh - 84px);
      overflow: hidden;
      color: #fff;
      background: var(--brand-950);
    }

    .preview-hero img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 48%;
      filter: saturate(.88) contrast(1.02);
      transform: scale(1.008);
      animation: previewDrift 7s ease-out both;
    }

    .preview-hero::after {
      content: '';
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(4,26,22,.9) 0%, rgba(4,26,22,.58) 42%, rgba(4,26,22,.14) 78%),
        linear-gradient(0deg, rgba(4,26,22,.74), transparent 58%);
    }

    .preview-copy {
      position: relative;
      z-index: 2;
      width: min(94%, 920px);
      min-height: calc(100dvh - 84px);
      padding: clamp(4rem, 10vh, 8rem) clamp(1.4rem, 3vw, 3rem) 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .preview-kicker {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .preview-copy h1 {
      max-width: 760px;
      margin: 1rem 0 .8rem;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(4rem, 9vw, 8.2rem);
      line-height: .86;
      letter-spacing: -.055em;
    }

    .preview-copy p {
      max-width: 620px;
      margin: 0;
      color: rgba(255,255,255,.78);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.65;
    }

    .preview-status {
      margin-top: 2rem;
      width: min(320px, 75vw);
      height: 3px;
      overflow: hidden;
      border-radius: 99px;
      background: rgba(255,255,255,.22);
    }

    .preview-status::after {
      content: '';
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: #dcebe4;
      animation: progress 1.45s ease-in-out infinite;
    }

    .fallback {
      position: fixed;
      z-index: 3;
      right: 1rem;
      bottom: max(1rem, env(safe-area-inset-bottom));
      display: none;
      padding: .8rem 1rem;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 999px;
      color: #fff;
      background: rgba(8,35,31,.88);
      text-decoration: none;
      font-size: .78rem;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .fallback.show { display: inline-flex; }

    @keyframes progress {
      0% { transform: translateX(-110%); }
      60%,100% { transform: translateX(260%); }
    }

    @keyframes previewDrift {
      from { transform: scale(1.025); }
      to { transform: scale(1.008); }
    }

    @media (max-width: 720px) {
      .preview-nav {
        height: 72px;
        padding: 0 1.25rem;
      }

      .preview-logo { width: 96px; }
      .preview-brand { display: none; }

      .preview-hero {
        min-height: calc(100dvh - 72px);
        display: grid;
        grid-template-rows: auto auto;
      }

      .preview-hero img {
        position: relative;
        inset: auto;
        width: 100%;
        height: auto;
        max-height: 55dvh;
        object-fit: contain;
        object-position: center;
        background: #edf2ef;
        animation: none;
      }

      .preview-hero::after {
        z-index: 1;
        top: auto;
        height: 38px;
        background: linear-gradient(180deg, rgba(8,35,31,0), var(--brand-950));
        transform: translateY(-37px);
      }

      .preview-copy {
        min-height: 0;
        width: 100%;
        padding: 1rem 1.25rem 2rem;
        justify-content: flex-start;
        background: var(--brand-950);
      }

      .preview-copy h1 {
        margin-top: .8rem;
        font-size: clamp(3.15rem, 15vw, 4.5rem);
        line-height: .9;
      }

      .preview-copy p {
        font-size: .9rem;
        line-height: 1.6;
      }

      .preview-status {
        margin-top: 1.4rem;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      #etos-app,
      .launch-preview,
      .preview-hero img,
      .preview-status::after {
        animation: none;
        transition-duration: 1ms;
      }
    }
  </style>
</head>

<body>
  <div id="launch-preview" class="launch-preview" aria-hidden="true">
    <div class="preview-nav">
      <img class="preview-logo" src="https://drive.google.com/thumbnail?id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i&sz=w400" alt="">
      <span class="preview-brand">Etos ID Palu</span>
      <span class="preview-lines" aria-hidden="true"><span></span><span></span><span></span></span>
    </div>

    <section class="preview-hero">
      <img src="https://lh3.googleusercontent.com/d/1vre9si_Z0EmxHxyvf2kHvADxj1KwPlao=w1600" alt="">
      <div class="preview-copy">
        <span class="preview-kicker">Ekosistem Pembinaan &amp; Literasi</span>
        <h1>Etos ID Palu</h1>
        <p>Membentuk nalar kritis, menempa etos peradaban.</p>
        <div class="preview-status" aria-hidden="true"></div>
      </div>
    </section>
  </div>

  <iframe
    id="etos-app"
    name="etos-app"
    src="https://script.google.com/macros/s/AKfycby2KnGRMyFCJxL-FaKy4v5z085Bmz1-S1RedUt2jdsX3pcyRsyTuYR1n7P1yjHM90U/exec"
    title="Etos ID Palu"
    scrolling="yes"
    loading="eager"
    allow="camera; microphone; geolocation; clipboard-read; clipboard-write; fullscreen"
    allowfullscreen
  ></iframe>

  <a
    id="fallback"
    class="fallback"
    href="https://script.google.com/macros/s/AKfycby2KnGRMyFCJxL-FaKy4v5z085Bmz1-S1RedUt2jdsX3pcyRsyTuYR1n7P1yjHM90U/exec"
    target="_self"
    rel="noopener"
  >Buka langsung</a>

  <script>
    (function () {
      var GAS_URL = 'https://script.google.com/macros/s/AKfycby2KnGRMyFCJxL-FaKy4v5z085Bmz1-S1RedUt2jdsX3pcyRsyTuYR1n7P1yjHM90U/exec';
      var iframe = document.getElementById('etos-app');
      var preview = document.getElementById('launch-preview');
      var fallback = document.getElementById('fallback');
      var ready = false;

      function parsePublicationRoute(pathname) {
        var match = String(pathname || '').match(/^\/(berita|opini)\/([a-z0-9-]+)\/?$/i);
        if(!match) return null;
        return { jenis: match[1].toLowerCase() === 'berita' ? 'Berita' : 'Opini', slug: match[2] };
      }

      function iframeUrlForLocation() {
        var route = parsePublicationRoute(window.location.pathname);
        if(!route) return GAS_URL;
        return GAS_URL + '?slug=' + encodeURIComponent(route.slug) + '&jenis=' + encodeURIComponent(route.jenis) + '&embedded=1';
      }

      function revealApp() {
        if (ready) return;
        ready = true;
        document.body.classList.add('app-ready');
        window.setTimeout(function () {
          if (preview && preview.parentNode) preview.parentNode.removeChild(preview);
        }, 520);
      }

      iframe.src = iframeUrlForLocation();
      fallback.href = iframe.src;

      iframe.addEventListener('load', function () {
        window.requestAnimationFrame(function () {
          window.requestAnimationFrame(revealApp);
        });
      }, { once: true });

      window.addEventListener('message', function(event) {
        if(event.source !== iframe.contentWindow) return;
        var data = event.data || {};
        if(data.source !== 'etos-id-palu' || data.action !== 'route') return;

        var path = String(data.path || '/');
        if(!/^\/$|^\/(berita|opini)\/[a-z0-9-]+\/?$/i.test(path)) path = '/';
        var method = data.replace ? 'replaceState' : 'pushState';
        window.history[method]({ etosRoute: true }, '', path);
        if(data.title) document.title = data.title;
      });

      window.addEventListener('popstate', function() {
        ready = true;
        document.body.classList.add('app-ready');
        iframe.src = iframeUrlForLocation();
        fallback.href = iframe.src;
      });

      window.setTimeout(function () {
        if (!ready) fallback.classList.add('show');
      }, 9000);
    }());
  </script>
</body>
</html>
