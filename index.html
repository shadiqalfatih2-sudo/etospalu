<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0e2f2d">
  <meta name="application-name" content="Etos ID Palu">
  <title>Etos ID Palu</title>
  <meta name="description" content="Etos ID Palu adalah ekosistem pembinaan karakter, pengembangan intelektual, penguatan spiritual, dan publikasi gagasan para awardee.">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Etos ID Palu">
  <meta property="og:title" content="Etos ID Palu">
  <meta property="og:description" content="Membentuk nalar kritis, menempa etos peradaban.">
  <meta property="og:url" content="https://etosidpalu.com/">
  <meta property="og:image" content="https://lh3.googleusercontent.com/d/1vre9si_Z0EmxHxyvf2kHvADxj1KwPlao=w1600">
  <meta property="og:image:secure_url" content="https://lh3.googleusercontent.com/d/1vre9si_Z0EmxHxyvf2kHvADxj1KwPlao=w1600">
  <meta property="og:image:alt" content="Etos ID Palu">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Etos ID Palu">
  <meta name="twitter:description" content="Membentuk nalar kritis, menempa etos peradaban.">
  <meta name="twitter:image" content="https://lh3.googleusercontent.com/d/1vre9si_Z0EmxHxyvf2kHvADxj1KwPlao=w1600">
  <link rel="canonical" href="https://etosidpalu.com/">

  <link rel="preconnect" href="https://script.google.com">
  <link rel="preconnect" href="https://script.googleusercontent.com">
  <link rel="preconnect" href="https://lh3.googleusercontent.com">
  <link rel="preconnect" href="https://drive.google.com">
  <link rel="preload" as="image" href="https://lh3.googleusercontent.com/d/1vre9si_Z0EmxHxyvf2kHvADxj1KwPlao=w1600">

  <link rel="icon" type="image/png" sizes="32x32" href="https://drive.google.com/thumbnail?id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i&sz=w32">
  <link rel="icon" type="image/png" sizes="128x128" href="https://drive.google.com/thumbnail?id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i&sz=w128">
  <link rel="apple-touch-icon" href="https://drive.google.com/thumbnail?id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i&sz=w180">

  <style>
    :root {
      --brand-950: #08231f;
      --brand-900: #0e2f2d;
      --brand-700: #26735b;
      --paper: #f4f7f6;
      --ink: #17211d;
      --line: #dce5e0;
    }

    * { box-sizing: border-box; }

    html, body {
      width: 100%;
      height: 100%;
      min-height: -webkit-fill-available;
      margin: 0;
      overflow: hidden;
      background: var(--brand-950);
      font-family: Arial, Helvetica, sans-serif;
    }

    #etos-app {
      position: fixed;
      inset: 0;
      z-index: 1;
      display: block;
      width: 100%;
      height: 100vh;
      height: 100dvh;
      min-height: -webkit-fill-available;
      border: 0;
      background: var(--brand-950);
      opacity: .001;
      pointer-events: none;
      transform: translateZ(0);
      transition: opacity .22s ease;
    }

    body.frame-ready #etos-app { opacity: 1; }
    body.app-ready #etos-app { pointer-events: auto; }

    .launch-preview {
      position: fixed;
      inset: 0;
      z-index: 2;
      overflow: hidden;
      background: var(--brand-950);
      opacity: 1;
      visibility: visible;
      transition: opacity .42s cubic-bezier(.22,1,.36,1), visibility 0s linear 0s;
    }

    body.app-ready .launch-preview {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity .42s cubic-bezier(.22,1,.36,1), visibility 0s linear .42s;
    }

    .preview-nav {
      height: 84px;
      padding: 0 clamp(1.25rem, 3vw, 2.6rem);
      display: flex;
      align-items: center;
      gap: 1.1rem;
      background: rgba(255,255,255,.985);
      border-top: 2px solid var(--brand-700);
      border-bottom: 1px solid var(--line);
    }

    .preview-logo { width: 74px; max-height: 43px; object-fit: contain; }

    .preview-brand {
      color: #14201b;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(1.55rem, 3vw, 2rem);
      font-weight: 700;
      letter-spacing: -.03em;
    }

    .preview-lines {
      margin-left: auto;
      width: 34px;
      height: 24px;
      display: grid;
      align-content: space-between;
    }

    .preview-lines span { display: block; height: 2px; border-radius: 99px; background: var(--ink); }

    .preview-hero {
      position: relative;
      min-height: calc(100dvh - 84px);
      overflow: hidden;
      color: #fff;
      background: var(--brand-950);
    }

    .preview-photo {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center 48%;
      filter: saturate(.9) contrast(1.02);
      transform: scale(1.018);
      animation: previewDrift 8s ease-out both;
    }

    .preview-shade {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, rgba(4,26,22,.9) 0%, rgba(4,26,22,.58) 42%, rgba(4,26,22,.14) 78%),
        linear-gradient(0deg, rgba(4,26,22,.72), transparent 58%);
    }

    .preview-copy {
      position: relative;
      z-index: 2;
      width: min(94%, 920px);
      min-height: calc(100dvh - 84px);
      padding: clamp(4rem, 10vh, 8rem) clamp(1.4rem, 3vw, 3rem) 4rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: flex-start;
    }

    .preview-kicker {
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .22em;
      text-transform: uppercase;
    }

    .preview-copy h1 {
      max-width: 760px;
      margin: 1rem 0 .8rem;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: clamp(4rem, 9vw, 8.2rem);
      line-height: .86;
      letter-spacing: -.055em;
    }

    .preview-tagline {
      max-width: 650px;
      margin: 0;
      color: rgba(255,255,255,.82);
      font-size: clamp(1rem, 2vw, 1.25rem);
      line-height: 1.65;
    }

    .preview-actions { display: flex; gap: .75rem; margin-top: 1.7rem; }

    .preview-action {
      min-height: 46px;
      padding: 0 1.2rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(255,255,255,.45);
      border-radius: 999px;
      color: #fff;
      background: rgba(255,255,255,.06);
      font-size: .7rem;
      font-weight: 800;
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .preview-action.primary { color: var(--brand-950); border-color: #e6f0e9; background: #e6f0e9; }

    .preview-loading {
      margin-top: 1.65rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      color: rgba(255,255,255,.66);
      font-size: .68rem;
      font-weight: 700;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    .preview-progress {
      position: relative;
      width: 120px;
      height: 3px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255,255,255,.2);
    }

    .preview-progress::after {
      content: '';
      position: absolute;
      inset: 0 auto 0 0;
      width: 42%;
      border-radius: inherit;
      background: #a9cbb7;
      animation: progress 1.05s cubic-bezier(.4,0,.2,1) infinite;
    }

    .preview-focus { display: none; }

    .fallback {
      position: fixed;
      z-index: 3;
      right: 1rem;
      bottom: max(1rem, env(safe-area-inset-bottom));
      display: none;
      padding: .8rem 1rem;
      border: 1px solid rgba(255,255,255,.35);
      border-radius: 999px;
      color: #fff;
      background: rgba(8,35,31,.9);
      text-decoration: none;
      font-size: .78rem;
      font-weight: 700;
      backdrop-filter: blur(10px);
    }

    .fallback.show { display: inline-flex; }

    @keyframes progress {
      0% { transform: translateX(-115%); }
      60%,100% { transform: translateX(270%); }
    }

    @keyframes previewDrift {
      from { transform: scale(1.035); }
      to { transform: scale(1.018); }
    }

    @media (max-width: 720px) {
      .launch-preview { overflow-y: auto; overflow-x: hidden; background: var(--paper); }
      .preview-nav { height: 72px; padding: 0 1.25rem; position: relative; z-index: 5; }
      .preview-logo { width: 96px; }
      .preview-brand { display: none; }

      .preview-hero {
        min-height: 0;
        display: grid;
        grid-template-rows: auto auto;
        overflow: visible;
      }

      .preview-photo {
        position: relative;
        inset: auto;
        grid-row: 1;
        width: 100%;
        height: auto;
        display: block;
        object-fit: contain;
        object-position: center;
        transform: none;
        animation: none;
        filter: saturate(.94) contrast(1.015);
        background: var(--brand-950);
      }

      .preview-shade { display: none; }

      .preview-copy {
        grid-row: 2;
        width: 100%;
        min-height: 0;
        margin-top: -112px;
        padding: 7.6rem 1.25rem 2rem;
        display: flex;
        justify-content: flex-start;
        background: linear-gradient(
          180deg,
          rgba(8,35,31,0) 0,
          rgba(8,35,31,.32) 30px,
          rgba(8,35,31,.78) 70px,
          var(--brand-950) 112px,
          var(--brand-950) 100%
        );
      }

      .preview-kicker { font-size: .58rem; line-height: 1.5; letter-spacing: .16em; }
      .preview-copy h1 { margin: .9rem 0 .75rem; font-size: clamp(3.2rem, 15.5vw, 4.45rem); line-height: .9; }
      .preview-tagline { font-family: Georgia, 'Times New Roman', serif; font-size: clamp(1.28rem, 6.4vw, 1.72rem); font-style: italic; line-height: 1.16; }
      .preview-actions { width: 100%; display: grid; grid-template-columns: 1fr; margin-top: 1.45rem; }
      .preview-action { width: 100%; min-height: 50px; }
      .preview-loading { width: 100%; margin-top: 1.25rem; justify-content: space-between; }
      .preview-progress { width: min(42vw, 160px); }

      .preview-focus {
        display: grid;
        grid-template-columns: repeat(3, 148px);
        width: 100%;
        overflow: hidden;
        color: var(--ink);
        background: #fff;
        border-radius: 0 0 24px 24px;
        box-shadow: 0 18px 42px rgba(8,31,27,.09);
      }

      .preview-focus span {
        min-height: 94px;
        padding: 1rem .5rem;
        display: grid;
        place-items: center;
        border-right: 1px solid var(--line);
        text-align: center;
        font-size: .78rem;
        font-weight: 800;
        line-height: 1.45;
      }

      .preview-focus b { display: block; color: var(--brand-700); }
    }

    @media (max-width: 390px) {
      .preview-copy { margin-top: -92px; padding: 6.35rem 1rem 1.8rem; }
      .preview-copy h1 { font-size: clamp(2.95rem, 15vw, 3.85rem); }
      .preview-tagline { font-size: clamp(1.15rem, 6.2vw, 1.5rem); }
    }

    @media (prefers-reduced-motion: reduce) {
      .launch-preview,
      .preview-photo,
      .preview-progress::after { animation: none; transition-duration: 1ms; }
    }
  </style>
</head>
<body>
  <div id="launch-preview" class="launch-preview" aria-live="polite">
    <div class="preview-nav">
      <img class="preview-logo" src="https://drive.google.com/thumbnail?id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i&sz=w400" alt="Logo Etos ID">
      <span class="preview-brand">Etos ID Palu</span>
      <span class="preview-lines" aria-hidden="true"><span></span><span></span><span></span></span>
    </div>

    <section class="preview-hero">
      <img class="preview-photo" src="https://lh3.googleusercontent.com/d/1vre9si_Z0EmxHxyvf2kHvADxj1KwPlao=w1600" alt="Kegiatan Etos ID Palu">
      <div class="preview-shade"></div>
      <div class="preview-copy">
        <span class="preview-kicker">Ekosistem Pembinaan &amp; Literasi</span>
        <h1>Etos ID Palu</h1>
        <p class="preview-tagline">Membentuk Nalar Kritis, Menempa Etos Peradaban.</p>
        <div class="preview-actions" aria-hidden="true">
          <span class="preview-action primary">Jelajahi Program</span>
          <span class="preview-action">Ikuti Perjalanan Kami</span>
        </div>
        <div class="preview-loading">
          <span>Menyiapkan halaman</span>
          <span class="preview-progress" aria-hidden="true"></span>
        </div>
      </div>
      <div class="preview-focus" aria-hidden="true">
        <span>Character <b>Building</b></span>
        <span>Leadership <b>Development</b></span>
        <span>Critical <b>Literacy</b></span>
      </div>
    </section>
  </div>

  <iframe
    id="etos-app"
    name="etos-app"
    src="https://script.google.com/macros/s/AKfycbxtKlccHxr1kuXlIP6YjXeVTQ5VAAA9eAtNn4RJjHzSMo7b62QaTi7i8A8mDFYMvME/exec"
    title="Etos ID Palu"
    scrolling="yes"
    loading="eager"
    allow="camera; microphone; geolocation; clipboard-read; clipboard-write; fullscreen"
    allowfullscreen
  ></iframe>

  <a
    id="fallback"
    class="fallback"
    href="https://script.google.com/macros/s/AKfycbxtKlccHxr1kuXlIP6YjXeVTQ5VAAA9eAtNn4RJjHzSMo7b62QaTi7i8A8mDFYMvME/exec"
    target="_self"
    rel="noopener"
  >Buka langsung</a>

  <script>
    const ETOS_PUBLIC_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxtKlccHxr1kuXlIP6YjXeVTQ5VAAA9eAtNn4RJjHzSMo7b62QaTi7i8A8mDFYMvME/exec";

    (function () {
      var GAS_URL = ETOS_PUBLIC_WEB_APP_URL;
      var iframe = document.getElementById('etos-app');
      var preview = document.getElementById('launch-preview');
      var fallback = document.getElementById('fallback');
      var ready = false;
      var loadFallbackTimer = null;
      var frameLoaded = false;
      var startedAt = (window.performance && performance.now)
        ? performance.now()
        : Date.now();
      var MIN_PREVIEW_MS = 420;
      var MAX_AFTER_LOAD_MS = 760;

      function parsePublicationRoute(pathname) {
        var match = String(pathname || '').match(/^\/(berita|opini)\/([a-z0-9-]+)\/?$/i);
        if(!match) return null;
        return { jenis: match[1].toLowerCase() === 'berita' ? 'Berita' : 'Opini', slug: match[2] };
      }

      function iframeUrlForLocation() {
        var route = parsePublicationRoute(window.location.pathname);
        if(!route) return GAS_URL;
        return GAS_URL + '?slug=' + encodeURIComponent(route.slug) + '&jenis=' + encodeURIComponent(route.jenis) + '&embedded=1';
      }

      function revealApp() {
        if(ready) return;
        ready = true;
        if(loadFallbackTimer) window.clearTimeout(loadFallbackTimer);

        var now = (window.performance && performance.now)
          ? performance.now()
          : Date.now();
        var remaining = Math.max(0, MIN_PREVIEW_MS - (now - startedAt));

        /*
         * Iframe sudah dirender di belakang preview. Preview baru memudar
         * setelah browser memperoleh dua frame paint, sehingga tidak ada
         * layar putih, tetapi juga tidak ada waktu tunggu tetap yang lama.
         */
        document.body.classList.add('frame-ready');

        window.setTimeout(function() {
          window.requestAnimationFrame(function() {
            window.requestAnimationFrame(function() {
              document.body.classList.add('app-ready');

              window.setTimeout(function () {
                if(preview && preview.parentNode) {
                  preview.parentNode.removeChild(preview);
                }
              }, 560);
            });
          });
        }, remaining);
      }

      iframe.src = iframeUrlForLocation();
      fallback.href = iframe.src;

      iframe.addEventListener('load', function () {
        frameLoaded = true;
        document.body.classList.add('frame-ready');

        /*
         * Sinyal visual-ready dari halaman Apps Script tetap menjadi jalur
         * utama. Bila pesan lintas-frame diblokir browser, wrapper tidak lagi
         * menunggu 3,2 detik; halaman dibuka segera setelah paint singkat.
         */
        loadFallbackTimer = window.setTimeout(function () {
          revealApp();
        }, MAX_AFTER_LOAD_MS);
      }, { once: true });

      window.addEventListener('message', function(event) {
        if(event.source !== iframe.contentWindow) return;
        var data = event.data || {};
        if(data.source !== 'etos-id-palu') return;

        if(data.action === 'ready') {
          revealApp();
          return;
        }

        if(data.action !== 'route') return;
        var path = String(data.path || '/');
        if(!/^\/$|^\/(berita|opini)\/[a-z0-9-]+\/?$/i.test(path)) path = '/';
        var method = data.replace ? 'replaceState' : 'pushState';
        window.history[method]({ etosRoute: true }, '', path);
        if(data.title) document.title = data.title;
      });

      window.addEventListener('popstate', function() {
        iframe.src = iframeUrlForLocation();
        fallback.href = iframe.src;
      });

      window.setTimeout(function () {
        if(!ready && !frameLoaded) fallback.classList.add('show');
      }, 7000);
    }());
  </script>
</body>
</html>
