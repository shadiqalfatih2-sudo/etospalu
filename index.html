<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#ffffff">
  <meta name="description" content="Etos ID Palu">

  <title>Etos ID Palu</title>

  <!-- Favicon Google Drive -->
  <link rel="icon" type="image/png" href="https://drive.google.com/uc?export=view&id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i">
  <link rel="apple-touch-icon" href="https://drive.google.com/uc?export=view&id=1RBwPV9Zy28PsN3X1A76Z9dmWz5W4LB1i">

  <style>
    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: #ffffff;
      font-family: Arial, Helvetica, sans-serif;
    }

    .app-shell {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
      background: #ffffff;
    }

    #app-frame {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      background: #ffffff;
    }

    .loader {
      position: absolute;
      inset: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      background: #ffffff;
      color: #334155;
      transition: opacity 0.35s ease, visibility 0.35s ease;
    }

    .loader.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .spinner {
      width: 38px;
      height: 38px;
      border: 4px solid #dbe7e7;
      border-top-color: #4b8b8b;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loader p {
      margin: 0;
      font-size: 14px;
    }

    .fallback {
      position: fixed;
      right: 14px;
      bottom: calc(14px + env(safe-area-inset-bottom));
      z-index: 3;
    }

    .fallback a {
      display: inline-flex;
      align-items: center;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(30, 41, 59, 0.92);
      color: #ffffff;
      text-decoration: none;
      font-size: 13px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.18);
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <div id="loader" class="loader" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <p>Memuat Etos ID Palu...</p>
    </div>

    <iframe
      id="app-frame"
      src="https://script.google.com/macros/s/AKfycbxtKlccHxr1kuXlIP6YjXeVTQ5VAAA9eAtNn4RJjHzSMo7b62QaTi7i8A8mDFYMvME/exec"
      title="Etos ID Palu"
      loading="eager"
      allow="clipboard-read; clipboard-write; fullscreen"
      allowfullscreen
      referrerpolicy="strict-origin-when-cross-origin">
    </iframe>

    <div class="fallback">
      <a
        href="https://script.google.com/macros/s/AKfycbxtKlccHxr1kuXlIP6YjXeVTQ5VAAA9eAtNn4RJjHzSMo7b62QaTi7i8A8mDFYMvME/exec"
        target="_blank"
        rel="noopener noreferrer">
        Buka langsung
      </a>
    </div>
  </main>

  <script>
    (function () {
      var frame = document.getElementById('app-frame');
      var loader = document.getElementById('loader');

      function hideLoader() {
        loader.classList.add('hidden');
      }

      frame.addEventListener('load', hideLoader);

      // Mencegah loader terus tampil jika browser tidak mengirim event load.
      window.setTimeout(hideLoader, 8000);
    })();
  </script>
</body>
</html>
